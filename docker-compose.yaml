services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${APP_ENV:-development}
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
        - action: rebuild
          path: package.json
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    depends_on:
      - pokeapi

  pokeapi:
    build:
      context: fakes/pokeapi
    container_name: pokeapi
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
    volumes:
      - ./fakes/pokeapi:/app
      - /app/node_modules
    restart: unless-stopped
