services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${APP_ENV:-development}
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
        - action: rebuild
          path: package.json
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    depends_on:
      pokeapi:
        condition: service_healthy

  pokeapi:
    build:
      context: fakes/pokeapi
    container_name: pokeapi
    ports:
      - "4000:4000"
    volumes:
      - ./fakes/pokeapi:/app
      - /app/node_modules
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:4000"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  ci:
    build:
      context: .
      dockerfile: Dockerfile-ci
    container_name: ci
    volumes:
      - .:/app
    depends_on:
      pokeapi:
        condition: service_healthy
